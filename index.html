<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="main">
      <div id="container">  <input type="text" id="display">
        <div id="containerButtons">
        <button class="buttons yellow functionButtons" >+</button>
        
        <button class="buttons  numberButtons">7</button>
        <button class="buttons numberButtons">8</button>
        
        <button class="buttons numberButtons">9</button>
        <button class="buttons yellow functionButtons">-</button>
        <button class="buttons numberButtons">4</button>
        <button class="buttons numberButtons">5</button>

        <button class="buttons numberButtons">6</button>
        <button class="buttons yellow functionButtons" >*</button>
        <button class="buttons numberButtons">1</button>
        <button class="buttons numberButtons">2</button>
        <button class="buttons numberButtons">3</button>
        <button class="buttons yellow functionButtons" >/</button>
         <button class="buttons yellow numberButtons" >.</button>
        <button class="buttons yellow" id="clear" >C</button>
        
        <button class="buttons  numberButtons">0</button>
        <button class="buttons yellow" id="equal" >=</button>
    </div>
</div>
</div>
    <script src="script.js"></script>
</body>
</html>
